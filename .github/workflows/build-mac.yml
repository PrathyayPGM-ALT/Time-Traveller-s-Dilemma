name: Build macOS app

# Run it by hand from the Actions tab (or automatically when you push a vN tag).
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14   # Apple Silicon (M1/M2/M3…)
            arch: AppleSilicon
          - runner: macos-13   # Intel (also runs on Apple Silicon via Rosetta)
            arch: Intel
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pygame-ce pyinstaller

      - name: Build the .app
        run: python build.py

      - name: Zip the .app (preserves bundle structure & permissions)
        run: |
          ditto -c -k --keepParent \
            "dist/TimeTravellersDilemma.app" \
            "TimeTravellersDilemma-mac-${{ matrix.arch }}.zip"

      - name: Upload the build
        uses: actions/upload-artifact@v4
        with:
          name: TimeTravellersDilemma-mac-${{ matrix.arch }}
          path: TimeTravellersDilemma-mac-${{ matrix.arch }}.zip
